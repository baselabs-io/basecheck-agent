agent:
  name: "basecheck-siem-demo"
  token_file: ""

control_sets:
  source: "local"
  local_path: "CONTROL_SETS_PATH"

databases:
  - name: "sqlite-demo"
    type: "sqlite"
    database: "DATABASE_PATH"

output:
  mode: "siem_only"
  siem:
    destination: "webhook"
    webhook:
      url: "http://127.0.0.1:8787/events"
      timeout_seconds: 5

security:
  allow_http: true
  require_signatures: true
  # Same repo-local dev key as config.yaml.example (see .signing/README.md /
  # docs/SIGNING.md); verifies the real bundled control-sets/*.yaml this demo
  # runs against, so the demo exercises the same signature-checking path as
  # a real release rather than disabling it.
  public_key: ""

logging:
  output: "stdout"
